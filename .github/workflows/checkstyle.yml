name: Checkstyle
on:
  - pull_request
  - workflow_dispatch
jobs:
  checkstyle:
    name: checkstyle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dbelyaev/action-checkstyle@v3
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-check
